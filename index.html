<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo Alexander | Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            scroll-behavior: smooth;
        }

        /* NAVBAR */
        nav {
            background: #1e293b;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: #38bdf8;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: white;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 45px;
            color: #38bdf8;
        }

        button {
            padding: 12px 25px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }

        /* SECTION */
        section {
            padding: 60px 20px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            margin: 15px auto;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* FOOTER */
        footer {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </nav>

    <div class="hero" id="home">
        <h1>Theo Alexander 😎</h1>
        <p>Future Developer & Tactical Mind</p>
        <button onclick="alert('No Striker No Problem 🔥')">Click Me</button>
    </div>

    <section id="about">
        <h2>About Me</h2>
        <p>I love coding, football philosophy, and building cool digital projects.</p>
    </section>

    <section id="skills">
        <h2>My Skills</h2>
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript (Soon 🔥)</div>
    </section>

    <section id="contact">
        <h2>Contact Me</h2>
        <p>Email: theo@example.com</p>
    </section>

    <footer>
        © 2026 Theo Alexander. All Rights Reserved.
    </footer>

</body>

</html>
